<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Mother's Day, Jwoo 🌸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blush: #f2c4ce;
      --rose:  #d4697e;
      --deep:  #8b3a4a;
      --cream: #fdf6f0;
      --gold:  #c9a96e;
    }

    html, body { height: 100%; width: 100%; overflow: hidden; background: #1a0a0e; }

    #petals { position: fixed; inset: 0; pointer-events: none; z-index: 10; }

    #stage {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #1a0a0e;
    }
    video { width: 100%; height: 100%; object-fit: cover; display: block; }

    #vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 5;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(26,10,14,0.72) 100%);
    }

    #message {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 210;
      display: flex; flex-direction: column; align-items: center;
      padding: clamp(12px, 3vw, 32px) 20px clamp(16px, 4vw, 40px);
      background: linear-gradient(to top, rgba(26,10,14,0.92) 0%, rgba(26,10,14,0.5) 60%, transparent 100%);
      pointer-events: none;
      opacity: 0; transform: translateY(12px);
      animation: rise 1.2s ease 0.3s forwards;
    }
    @keyframes rise { to { opacity: 1; transform: translateY(0); } }

    .name {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: clamp(28px, 6vw, 64px);
      color: var(--cream);
      line-height: 1.1;
      text-shadow: 0 0 60px rgba(212,105,126,0.6), 0 2px 4px rgba(0,0,0,0.4);
      margin-bottom: 4px;
      text-align: center;
    }
    .year {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(13px, 2.8vw, 18px);
      letter-spacing: 0.5em;
      color: var(--gold);
      text-transform: uppercase;
    }
    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 6px 0 8px; opacity: 0.7;
    }
    .divider-line {
      width: clamp(30px, 8vw, 80px); height: 1px;
      background: linear-gradient(to right, transparent, var(--rose), transparent);
    }
    .divider-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--rose); }

    .corner {
      position: fixed; z-index: 215; pointer-events: none;
      opacity: 0; animation: fadein 2s ease 0.5s forwards;
    }
    @keyframes fadein { to { opacity: 1; } }
    .corner-tl { top: 0; left: 0; }
    .corner-tr { top: 0; right: 0; transform: scaleX(-1); }

    @media (max-height: 500px) {
      .corner { display: none; }
      #message { padding: 8px 16px 12px; }
    }

    /* Tap-to-play overlay */
    #tap-overlay {
      position: fixed; inset: 0; z-index: 200;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(26, 10, 14, 0.55);
      cursor: pointer;
      transition: opacity 0.7s ease;
    }
    #tap-overlay.hidden { opacity: 0; pointer-events: none; }

    .tap-ring {
      width: clamp(80px, 20vw, 130px);
      height: clamp(80px, 20vw, 130px);
      border-radius: 50%;
      background: rgba(212, 105, 126, 0.15);
      border: 1.5px solid rgba(242, 196, 206, 0.55);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 22px;
      animation: pulse 2.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(212,105,126,0.35); }
      55%       { box-shadow: 0 0 0 22px rgba(212,105,126,0); }
    }
    .tap-ring svg { width: 38%; height: 38%; fill: var(--blush); margin-left: 8%; }
    .tap-text {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300; font-style: italic;
      font-size: clamp(15px, 3.5vw, 20px);
      color: var(--blush); letter-spacing: 0.18em;
    }
  </style>
</head>
<body>

<!-- Video -->
<div id="stage">
  <video id="vid" src="My_Movie.mp4" playsinline loop preload="auto"></video>
</div>

<!-- Vignette -->
<div id="vignette"></div>

<!-- Corner florals -->
<svg class="corner corner-tl" width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <g opacity="0.85">
    <path d="M10 150 Q 40 100 90 60" stroke="#8b3a4a" stroke-width="1.5" fill="none"/>
    <path d="M10 150 Q 55 120 110 90" stroke="#8b3a4a" stroke-width="1" fill="none" opacity="0.5"/>
    <ellipse cx="55" cy="105" rx="14" ry="6" fill="#6b4c3b" opacity="0.5" transform="rotate(-40 55 105)"/>
    <ellipse cx="78" cy="80" rx="12" ry="5" fill="#6b4c3b" opacity="0.4" transform="rotate(-55 78 80)"/>
    <circle cx="92" cy="58" r="12" fill="#d4697e" opacity="0.9"/>
    <circle cx="92" cy="58" r="7"  fill="#f2c4ce"/>
    <circle cx="92" cy="58" r="3"  fill="#c9a96e"/>
    <circle cx="112" cy="42" r="9"  fill="#e8889a" opacity="0.8"/>
    <circle cx="112" cy="42" r="5"  fill="#fdf6f0"/>
    <circle cx="112" cy="42" r="2.5" fill="#c9a96e"/>
    <circle cx="75" cy="45" r="7"  fill="#c9647a" opacity="0.7"/>
    <circle cx="75" cy="45" r="4"  fill="#f7d6db"/>
    <ellipse cx="130" cy="28" rx="5" ry="8" fill="#d4697e" opacity="0.6" transform="rotate(-20 130 28)"/>
    <ellipse cx="60" cy="35" rx="4" ry="6" fill="#e8889a" opacity="0.5" transform="rotate(10 60 35)"/>
  </g>
</svg>
<svg class="corner corner-tr" width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <g opacity="0.85">
    <path d="M10 150 Q 40 100 90 60" stroke="#8b3a4a" stroke-width="1.5" fill="none"/>
    <path d="M10 150 Q 55 120 110 90" stroke="#8b3a4a" stroke-width="1" fill="none" opacity="0.5"/>
    <ellipse cx="55" cy="105" rx="14" ry="6" fill="#6b4c3b" opacity="0.5" transform="rotate(-40 55 105)"/>
    <ellipse cx="78" cy="80" rx="12" ry="5" fill="#6b4c3b" opacity="0.4" transform="rotate(-55 78 80)"/>
    <circle cx="92" cy="58" r="12" fill="#d4697e" opacity="0.9"/>
    <circle cx="92" cy="58" r="7"  fill="#f2c4ce"/>
    <circle cx="92" cy="58" r="3"  fill="#c9a96e"/>
    <circle cx="112" cy="42" r="9"  fill="#e8889a" opacity="0.8"/>
    <circle cx="112" cy="42" r="5"  fill="#fdf6f0"/>
    <circle cx="112" cy="42" r="2.5" fill="#c9a96e"/>
    <circle cx="75" cy="45" r="7"  fill="#c9647a" opacity="0.7"/>
    <circle cx="75" cy="45" r="4"  fill="#f7d6db"/>
    <ellipse cx="130" cy="28" rx="5" ry="8" fill="#d4697e" opacity="0.6" transform="rotate(-20 130 28)"/>
    <ellipse cx="60" cy="35" rx="4" ry="6" fill="#e8889a" opacity="0.5" transform="rotate(10 60 35)"/>
  </g>
</svg>

<!-- Message -->
<div id="message">
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-dot"></div>
    <div class="divider-line"></div>
  </div>
  <div class="name">Happy Mother's Day, Jwoo</div>
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-dot"></div>
    <div class="divider-line"></div>
  </div>
  <div class="year">2 0 2 6</div>
</div>

<!-- Tap-to-play overlay -->
<div id="tap-overlay">
  <div class="tap-ring">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <polygon points="5,3 19,12 5,21"/>
    </svg>
  </div>
  <div class="tap-text">tap to play</div>
</div>

<!-- Petal canvas -->
<canvas id="petals"></canvas>

<script>
  const vid     = document.getElementById('vid');
  const overlay = document.getElementById('tap-overlay');

  function startPlayback(e) {
    e.preventDefault();
    vid.muted = false;
    vid.play().then(() => {
      overlay.classList.add('hidden');
    }).catch(err => {
      console.warn('Playback failed:', err);
    });
  }

  overlay.addEventListener('click',      startPlayback);
  overlay.addEventListener('touchend',   startPlayback, { passive: false });

  // Falling petals
  const canvas = document.getElementById('petals');
  const ctx    = canvas.getContext('2d');

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  const COLORS = ['#f2c4ce','#f9e8d0','#e8889a','#fbe0e8','#d4697e'];

  class Petal {
    constructor(init) { this.reset(init); }
    reset(fromTop) {
      this.x = Math.random() * canvas.width;
      this.y = fromTop ? -20 : Math.random() * canvas.height;
      this.r = 4 + Math.random() * 8;
      this.rx = this.r * (0.5 + Math.random() * 0.5);
      this.ry = this.r * (0.3 + Math.random() * 0.4);
      this.rot   = Math.random() * Math.PI * 2;
      this.dRot  = (Math.random() - 0.5) * 0.03;
      this.vx    = (Math.random() - 0.5) * 0.6;
      this.vy    = 0.4 + Math.random() * 0.8;
      this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
      this.alpha = 0.4 + Math.random() * 0.5;
      this.sway  = Math.random() * Math.PI * 2;
      this.swayS = 0.008 + Math.random() * 0.01;
    }
    update() {
      this.sway += this.swayS;
      this.x   += this.vx + Math.sin(this.sway) * 0.5;
      this.y   += this.vy;
      this.rot += this.dRot;
      if (this.y > canvas.height + 30) this.reset(true);
    }
    draw() {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rot);
      ctx.globalAlpha = this.alpha;
      ctx.fillStyle   = this.color;
      ctx.beginPath();
      ctx.ellipse(0, 0, this.rx, this.ry, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  const petals = Array.from({ length: 28 }, () => new Petal(false));
  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    petals.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(loop);
  }
  loop();
</script>
</body>
</html>
